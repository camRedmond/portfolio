# Nginx configuration for static portfolio site
# Optimized for performance, security, and staying in 512KB + NO-JS clubs
#
# NOTE: Use nginx-initial.conf FIRST, get SSL cert, THEN use this file!

server {
    listen 80;
    listen [::]:80;
    server_name camredmond.com www.camredmond.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name camredmond.com www.camredmond.com;

    # SSL Configuration (Let's Encrypt)
    # These paths are created by certbot
    ssl_certificate /etc/letsencrypt/live/camredmond.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camredmond.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root directory
    root /var/www/portfolio;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy (NO JavaScript allowed - protects NO-JS Club status)
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-src https://open.spotify.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression (reduces transfer size significantly!)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype image/svg+xml;
    gzip_min_length 256;

    # Browser Caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - shorter cache with revalidation
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Main location block
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 page (optional)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to git files
    location ~ /\.git {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/portfolio_access.log;
    error_log /var/log/nginx/portfolio_error.log warn;

    # Rate limiting (prevents abuse)
    limit_req zone=general burst=20 nodelay;
}

# Rate limiting zone definition (add this to nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
